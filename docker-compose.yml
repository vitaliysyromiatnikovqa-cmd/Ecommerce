services:
  postgres:
    image: postgres:16-alpine
    container_name: novacart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: novacart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d novacart']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: novacart-server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/novacart?schema=public
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: novacart-client
    restart: unless-stopped
    environment:
      VITE_API_PROXY_TARGET: http://server:3001
    depends_on:
      - server
    ports:
      - '5173:5173'

volumes:
  postgres_data:
