name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Build And API Regression
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Start Docker stack
        env:
          APP_DOMAIN: localhost
          AUTH_TOKEN_SECRET: ci-auth-token-secret
        run: docker compose up -d --build postgres server client

      - name: Create reports directory
        run: mkdir -p reports

      - name: Wait for backend health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3001/api/health > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 5
          done
          docker compose logs server
          exit 1

      - name: Wait for public app health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost/api/health > /dev/null; then
              echo "Public app is healthy"
              exit 0
            fi
            sleep 5
          done
          docker compose logs client
          exit 1

      - name: Run Postman collection with Newman
        run: >
          npx --yes -p newman@6 -p newman-reporter-htmlextra
          newman run docs/postman/GameReason-Auth-final.postman_collection.json
          --reporters cli,junit,htmlextra
          --reporter-junit-export reports/newman-auth.xml
          --reporter-htmlextra-export reports/newman-auth.html
          --reporter-htmlextra-title "GameReason Auth Report"
          --bail

      - name: Capture Docker logs on failure
        if: failure()
        run: docker compose logs --no-color > reports/docker-compose.log

      - name: Upload Newman report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-auth-report
          path: |
            reports/newman-auth.xml
            reports/newman-auth.html
          if-no-files-found: ignore

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: reports/docker-compose.log
          if-no-files-found: ignore

      - name: Stop Docker stack
        if: always()
        run: docker compose down -v --remove-orphans

  deploy:
    name: Deploy To VPS
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Check required deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USERNAME"
          test -n "$VPS_APP_PATH"
          test -n "$VPS_SSH_KEY"

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${VPS_PORT:-22}" -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy latest revision
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
        run: |
          ssh -p "${VPS_PORT:-22}" "${VPS_USERNAME}@${VPS_HOST}" "
            set -e
            cd '${VPS_APP_PATH}'
            git pull --ff-only
            docker compose up -d --build
            docker compose ps
          "
